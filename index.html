<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワイの木の物語 — 発表スクリプト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif;background:#eef5ee;color:#222}
header{background:linear-gradient(135deg,#1b4332,#40916c);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 10px rgba(0,0,0,.2);position:sticky;top:0;z-index:200}
.icon{font-size:1.8rem}
h1{font-size:1.1rem;font-weight:700;line-height:1.4}
.sub{font-size:.72rem;opacity:.8;margin-top:2px}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.counter{background:rgba(255,255,255,.18);border-radius:20px;padding:3px 13px;font-size:.85rem;font-weight:600}
.tbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:6px 13px;font-size:.8rem;cursor:pointer;font-weight:600;transition:background .2s;white-space:nowrap}
.tbtn:hover{background:rgba(255,255,255,.28)}
.layout{display:flex}
.sidebar{width:130px;min-width:130px;background:#1b4332;height:calc(100vh - 56px);position:sticky;top:56px;overflow-y:auto;padding:8px 6px;display:flex;flex-direction:column;gap:5px}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#40916c;border-radius:2px}
.ti{cursor:pointer;border-radius:5px;overflow:hidden;border:2px solid transparent;transition:border-color .2s;background:#0d2b1e}
.ti:hover{border-color:#74c69d}
.ti.active{border-color:#b7e4c7}
.ti img{width:100%;display:block}
.tno{width:100%;aspect-ratio:16/9;background:#0d2b1e;display:flex;align-items:center;justify-content:center;font-size:1rem}
.tl{background:rgba(0,0,0,.5);color:#fff;font-size:.58rem;padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.content{flex:1;padding:24px 20px 100px;max-width:820px}
.card{background:#fff;border-radius:13px;box-shadow:0 4px 16px rgba(0,0,0,.08);overflow:hidden;margin-bottom:24px}
.card.hl{box-shadow:0 0 0 3px #52b788,0 4px 16px rgba(0,0,0,.1)}
.ch{background:linear-gradient(90deg,#1b4332,#40916c);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:9px}
.badge{background:rgba(255,255,255,.22);border-radius:9px;padding:2px 10px;font-size:.75rem;font-weight:700}
.ctitle{font-size:.95rem;font-weight:600}
.iw{background:#111;display:flex;justify-content:center;align-items:center;min-height:140px}
.iw img{max-width:100%;max-height:460px;object-fit:contain;display:block}
.noimg{color:#777;font-size:.85rem;padding:32px;text-align:center}
.ss{padding:16px 20px 18px;background:#fafffe;border-top:1px solid #e0f0e8}
.slbl{font-size:.66rem;color:#40916c;font-weight:700;letter-spacing:.08em;margin-bottom:9px;text-transform:uppercase}
.line{padding:8px 12px;margin-bottom:6px;border-radius:6px;font-size:.91rem;line-height:1.65;border-left:3px solid transparent}
.line:last-child{margin-bottom:0}
.narrator{background:#f0f7f2;border-color:#52b788;color:#1b4332}
.character{background:#fffde7;border-color:#f9c74f;color:#4a3600}
.stage{background:#f5f5f5;border-color:#bbb;color:#666;font-style:italic}
.se{background:#f0f0ff;border-color:#9090dd;color:#333}
.end{background:transparent;border:none;text-align:center;font-weight:700;color:#1b4332;font-size:1rem;padding-top:12px}
nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;padding:10px 18px;display:none;align-items:center;gap:10px;box-shadow:0 -2px 10px rgba(0,0,0,.1);z-index:150}
nav button{background:#1b4332;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:.9rem;cursor:pointer;font-weight:600}
nav button:hover{background:#0d2b1e}
nav button:disabled{background:#bbb;cursor:default}
.pb{flex:1;height:5px;background:#ddd;border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#1b4332,#52b788);transition:width .3s}
@media(max-width:600px){.sidebar{width:80px;min-width:80px}.content{padding:14px 10px 90px}}
</style>
</head>
<body>
<header>
  <span class="icon">🌳</span>
  <div><h1>ワイの木の物語</h1><div class="sub">台本：PayPayが緑になった日から</div></div>
  <div class="hdr-r">
    <span class="counter" id="ctr">全24シーン</span>
    <button class="tbtn" id="tbtn" onclick="toggleMode()">🔍 1枚ずつ見る</button>
  </div>
</header>
<div class="layout">
  <div class="sidebar" id="sb"></div>
  <div class="content" id="ct"></div>
</div>
<nav id="nav">
  <button id="prevBtn" onclick="move(-1)">← 前へ</button>
  <div class="pb"><div class="pf" id="pf"></div></div>
  <button id="nextBtn" onclick="move(1)">次へ →</button>
</nav>
<script>
const S=[
  {num:1,title:"表紙",img:"",lines:["【ナレーター】 これは、ある一人の大学生をめぐる物語"]},
  {num:2,title:"物語の始まり",img:"slide2.png",lines:["【ナレーター】 時は2027年4月1日、木曜日のこと。彼女の名は○○、大学4回生。","【ナレーター】 ふと開いたPayPayの画面が、見慣れぬ緑色に染まっていた。","【タエコ】 なにこれ！"]},
  {num:3,title:"画面に注目",img:"slide3.png",lines:["【ト書き】 （スマホ画面のクローズアップ）","【タエコ】 ペイペイポイントなんか貯まってる！","【ナレーター】 ソフトバンクグリーンマイレージも貯まっている。"]},
  {num:4,title:"マイボトル",img:"slide4.png",lines:["【タエコ】 マイボトル使っても貯まるなんてお得やな～"]},
  {num:5,title:"日々の積み重ね",img:"slide5.png",lines:["【タエコ】 毎日頑張ってるからめっちゃ貯まるわ"]},
  {num:6,title:"新機能発見",img:"slide6.png",lines:["【タエコ】 推し森マッチング⁉そんな機能あんの⁉"]},
  {num:7,title:"推し村決定",img:"slide7.png",lines:["【タエコ】 奈良県か！川上村って初めて聞いた！"]},
  {num:8,title:"仲間の存在",img:"slide8.png",lines:["【タエコ】 みんな全然場所ちゃうやん。植樹量負けとる！がんばろ！"]},
  {num:9,title:"ワイの木ガチャ解放",img:"slide9.png",lines:["【ナレーター】 日々の小さな行動でマイルが貯まり、ワイの木ガチャを引けるようになった。","【タエコ】 木もらえるん！友達誘って行かな"]},
  {num:10,title:"グラングリーンにて",img:"slide10.png",lines:["【ナレーター】 場所はグラングリーン。彼女はついに、自分だけのワイの木を手にした。","【タエコ】 成長日記つけなあかんなぁ"]},
  {num:11,title:"BeReal",img:"slide11.png",lines:["【SE】 BeReal通知音","【タエコ】 BeRealきた！"]},
  {num:12,title:"広がる輪",img:"slide12.png",lines:["【ナレーター】 同じ頃、彼女の友人たちもまた、それぞれのSNSに投稿をし始めている。環境活動は、もはや誰かのものではなく、自分自身の物語になりつつあった。"]},
  {num:13,title:"マイル爆増",img:"slide13.png",lines:["【タエコ】 まってマイル、バリ貯まってんねんけど"]},
  {num:14,title:"届かない特典",img:"slide14.png",lines:["【ナレーター】 追加で使用可能なギガが日々の環境貢献活動により貯まっていく。しかし、ソフトバンク系列のユーザーのみが利用できるので、DOKONOユーザーのタエコちゃんは使えません。","【タエコ】 萎えるわ～"]},
  {num:15,title:"決意",img:"slide15.png",lines:["【タエコ】 卒業したら乗り換えるって決めててん"]},
  {num:16,title:"年度末レポート",img:"slide16.png",lines:["【ナレーター】 年度末——アプリで一年間の頑張りを見ることができる。","【タエコ】 頑張ったし友達に勝ったかな"]},
  {num:17,title:"新社会人",img:"slide17.png",lines:["【タエコ】 新社会人しんどっ。癒しが欲しいわ"]},
  {num:18,title:"癒し",img:"slide18.png",lines:["【タエコ】 ワイの木しか勝たんわ～"]},
  {num:19,title:"運命の通知",img:"slide19.png",lines:["【ナレーター】 そして迎えた8月のある日。タエコのもとに自治体からワイの木を推し森に植える準備ができたと通知が来ました。"]},
  {num:20,title:"歓喜",img:"slide20.png",lines:["【タエコ】 推し森行けるなんてガチ幸せ"]},
  {num:21,title:"仲間との再会",img:"slide21.png",lines:["【タエコ】 川上村仲間のみんな、会いたかったで"]},
  {num:22,title:"植樹の瞬間",img:"slide22.png",lines:["【ナレーター】 いよいよ、ワイの木を推し森に植えるときが来ました","【タエコ】 （しみじみと）一年間ありがとう。大きくなってな"]},
  {num:23,title:"新たな相棒",img:"slide23.png",lines:["【ナレーター】 ワイの木とは離れ離れになってしまいましたが、またマイルをため、新たなワイの木を手に入れました。","【タエコ】 新たな相棒、よろしく"]},
  {num:24,title:"エピローグ",img:"slide24.png",lines:["【ナレーター】 楽しく、お得で、しかも手応えがある——そんな環境貢献活動は、いつしか彼女の暮らしに溶け込んでいた。月日は流れ、かつての小さな苗木は、立派にCO₂を吸収する一本の樹へと育っていく。","【ト書き】 （間）","【ナレーター】 そう、すべては——あの日、PayPayの画面が緑に染まったことから始まったのだった……。","— 完 —"]}
];

let mode='all',cur=0;

function cls(l){
  if(l.startsWith('【ナレーター】'))return'narrator';
  if(l.startsWith('【ト書き】'))return'stage';
  if(l.startsWith('【SE】'))return'se';
  if(l==='— 完 —')return'end';
  return'character';
}
function card(s){
  const img=s.img
    ?`<div class="iw"><img src="${s.img}" alt="スライド${s.num}" loading="lazy"></div>`
    :`<div class="iw"><div class="noimg">🌱 スライド#${s.num}（画像なし）</div></div>`;
  const lines=s.lines.map(l=>`<div class="line ${cls(l)}">${l}</div>`).join('');
  return`<div class="card" id="c${s.num}">
    <div class="ch"><span class="badge">#${s.num}</span><span class="ctitle">${s.title}</span></div>
    ${img}
    <div class="ss"><div class="slbl">🎙 スクリプト</div>${lines}</div>
  </div>`;
}
function buildSB(){
  document.getElementById('sb').innerHTML=S.map((s,i)=>{
    const img=s.img
      ?`<img src="${s.img}" alt="${s.num}" loading="lazy">`
      :`<div class="tno">🌱</div>`;
    return`<div class="ti" id="t${s.num}" onclick="jumpTo(${i})">${img}<div class="tl">#${s.num} ${s.title}</div></div>`;
  }).join('');
}
function jumpTo(i){
  cur=i;
  if(mode==='all'){
    const el=document.getElementById('c'+S[i].num);
    if(el){el.scrollIntoView({behavior:'smooth',block:'start'});el.classList.add('hl');setTimeout(()=>el.classList.remove('hl'),1800);}
  }else renderOne(i);
  updThumb(i);
}
function updThumb(i){
  document.querySelectorAll('.ti').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('t'+S[i].num);
  if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function renderAll(){
  document.getElementById('ct').innerHTML=S.map(s=>card(s)).join('');
  document.getElementById('ctr').textContent=`全${S.length}シーン`;
  document.getElementById('nav').style.display='none';
  document.getElementById('tbtn').textContent='🔍 1枚ずつ見る';
}
function renderOne(i){
  const s=S[i];
  document.getElementById('ct').innerHTML=card(s);
  document.getElementById('ctr').textContent=`${i+1} / ${S.length}`;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===S.length-1;
  document.getElementById('pf').style.width=((i+1)/S.length*100)+'%';
  document.getElementById('nav').style.display='flex';
  document.getElementById('tbtn').textContent='📋 一覧表示';
  window.scrollTo({top:0,behavior:'smooth'});
  updThumb(i);
}
function move(d){cur=Math.max(0,Math.min(S.length-1,cur+d));renderOne(cur);}
function toggleMode(){if(mode==='all'){mode='one';renderOne(cur);}else{mode='all';renderAll();}}

buildSB();
renderAll();
</script>
</body>
</html>
