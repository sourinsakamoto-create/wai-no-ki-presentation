<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワイの木の物語 — 発表スクリプト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif;background:#111;color:#222;overflow-x:hidden}

/* ===== HEADER ===== */
header{
  background:linear-gradient(135deg,#1b4332,#40916c);
  color:#fff;
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  position:fixed;
  top:0;left:0;right:0;
  z-index:300;
  height:52px;
}
.icon{font-size:1.5rem}
h1{font-size:1rem;font-weight:700;line-height:1.3;white-space:nowrap}
.sub{font-size:.65rem;opacity:.8}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.counter{background:rgba(255,255,255,.18);border-radius:20px;padding:3px 12px;font-size:.82rem;font-weight:600;white-space:nowrap}
.tbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:7px;padding:5px 11px;font-size:.75rem;cursor:pointer;font-weight:600;white-space:nowrap}
.tbtn:hover{background:rgba(255,255,255,.28)}

/* ===== ONE-SLIDE MODE (default) ===== */
.one-view{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  padding-top:52px;
  padding-bottom:60px;
}

/* Image fills as much width as possible */
.img-area{
  width:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  /* Height: viewport minus header(52) minus nav(60) minus script area */
  min-height:calc(100vw * 9/16); /* 16:9 fallback */
}
.img-area img{
  width:100%;
  height:auto;
  max-height:calc(100vh - 52px - 60px - 160px);
  object-fit:contain;
  display:block;
}
.no-img-box{
  color:#666;
  font-size:.9rem;
  padding:40px;
  text-align:center;
  width:100%;
  aspect-ratio:16/9;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Script below image */
.script-area{
  background:#fafffe;
  border-top:3px solid #40916c;
  padding:14px 16px 16px;
}
.scene-label{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}
.badge{background:#1b4332;color:#fff;border-radius:8px;padding:2px 10px;font-size:.75rem;font-weight:700}
.scene-title{font-size:.9rem;font-weight:600;color:#1b4332}
.slbl{font-size:.62rem;color:#40916c;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.line{padding:7px 11px;margin-bottom:5px;border-radius:6px;font-size:.88rem;line-height:1.65;border-left:3px solid transparent}
.line:last-child{margin-bottom:0}
.narrator{background:#f0f7f2;border-color:#52b788;color:#1b4332}
.character{background:#fffde7;border-color:#f9c74f;color:#4a3600}
.stage{background:#f5f5f5;border-color:#bbb;color:#666;font-style:italic}
.se{background:#f0f0ff;border-color:#9090dd;color:#333}
.end{background:transparent;border:none;text-align:center;font-weight:700;color:#1b4332;font-size:1rem;padding-top:10px}

/* ===== BOTTOM NAV ===== */
nav{
  position:fixed;
  bottom:0;left:0;right:0;
  height:60px;
  background:#1b4332;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 14px;
  z-index:300;
}
nav button{
  background:rgba(255,255,255,.15);
  color:#fff;
  border:1px solid rgba(255,255,255,.3);
  border-radius:8px;
  padding:8px 18px;
  font-size:.88rem;
  cursor:pointer;
  font-weight:600;
  white-space:nowrap;
}
nav button:hover{background:rgba(255,255,255,.28)}
nav button:disabled{opacity:.35;cursor:default}
.pb{flex:1;height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#74c69d,#b7e4c7);border-radius:3px;transition:width .3s}

/* ===== ALL-SLIDES MODE ===== */
.all-view{display:none;padding:68px 0 24px}
.all-card{background:#fff;border-radius:12px;box-shadow:0 3px 14px rgba(0,0,0,.5);overflow:hidden;margin:0 12px 24px}
.all-card .ch{background:linear-gradient(90deg,#1b4332,#40916c);color:#fff;padding:9px 16px;display:flex;align-items:center;gap:8px}
.all-card .ch .badge{background:rgba(255,255,255,.22)}
.all-card .ch .scene-title{color:#fff}
.all-card .img-area{min-height:unset}
.all-card .img-area img{max-height:none}

/* ===== RESPONSIVE ===== */
@media(min-width:768px){
  .img-area img{
    max-height:calc(100vh - 52px - 60px - 180px);
  }
  .script-area{padding:16px 24px 20px}
  .line{font-size:.92rem}
  nav button{padding:9px 24px;font-size:.92rem}
  .all-card{margin:0 20px 28px}
}
@media(min-width:1200px){
  .one-view{
    flex-direction:row;
    align-items:stretch;
    padding-bottom:60px;
  }
  .img-col{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    min-height:calc(100vh - 52px - 60px);
  }
  .img-col img{
    width:100%;
    height:auto;
    max-height:calc(100vh - 52px - 60px);
    object-fit:contain;
  }
  .img-col .no-img-box{
    aspect-ratio:unset;
    height:calc(100vh - 52px - 60px);
  }
  .script-col{
    width:380px;
    min-width:320px;
    max-width:420px;
    overflow-y:auto;
    background:#fafffe;
    border-left:3px solid #40916c;
    padding:20px;
    height:calc(100vh - 52px - 60px);
  }
  .img-area{display:none}
  .script-area{display:none}
}
</style>
</head>
<body>

<header>
  <span class="icon">🌳</span>
  <div>
    <h1>ワイの木の物語</h1>
    <div class="sub">PayPayが緑になった日から</div>
  </div>
  <div class="hdr-r">
    <span class="counter" id="ctr"></span>
    <button class="tbtn" id="tbtn" onclick="toggleMode()">📋 一覧</button>
  </div>
</header>

<!-- ONE SLIDE VIEW -->
<div class="one-view" id="oneView">
  <!-- mobile/tablet: stacked -->
  <div class="img-area" id="imgArea"></div>
  <div class="script-area" id="scriptArea"></div>
  <!-- desktop: side by side -->
  <div class="img-col" id="imgCol" style="display:none"></div>
  <div class="script-col" id="scriptCol" style="display:none"></div>
</div>

<!-- ALL SLIDES VIEW -->
<div class="all-view" id="allView"></div>

<nav id="nav">
  <button id="prevBtn" onclick="move(-1)">← 前へ</button>
  <div class="pb"><div class="pf" id="pf"></div></div>
  <button id="nextBtn" onclick="move(1)">次へ →</button>
</nav>

<script>
const S=[
  {num:1,title:"表紙",img:"",lines:["【ナレーター】 これは、ある一人の大学生をめぐる物語"]},
  {num:2,title:"物語の始まり",img:"slide2.png",lines:["【ナレーター】 時は2027年4月1日、木曜日のこと。彼女の名はタエコ、大学4回生。","【ナレーター】 ふと開いたPayPayの画面が、見慣れぬ緑色に染まっていた。","【タエコ】 なにこれ！"]},
  {num:3,title:"画面に注目",img:"slide3.png",lines:["【ト書き】 （スマホ画面のクローズアップ）","【タエコ】 ペイペイポイントなんか貯まってる！","【ナレーター】 ソフトバンクグリーンマイレージも貯まっている。"]},
  {num:4,title:"マイボトル",img:"slide4.png",lines:["【タエコ】 マイボトル使っても貯まるなんてお得やな～"]},
  {num:5,title:"日々の積み重ね",img:"slide5.png",lines:["【タエコ】 毎日頑張ってるからめっちゃ貯まるわ"]},
  {num:6,title:"新機能発見",img:"slide6.png",lines:["【タエコ】 推し森マッチング⁉そんな機能あんの⁉"]},
  {num:7,title:"推し村決定",img:"slide7.png",lines:["【タエコ】 奈良県か！川上村って初めて聞いた！"]},
  {num:8,title:"仲間の存在",img:"slide8.png",lines:["【タエコ】 みんな全然場所ちゃうやん。植樹量負けとる！がんばろ！"]},
  {num:9,title:"ワイの木ガチャ解放",img:"slide9.png",lines:["【ナレーター】 日々の小さな行動でマイルが貯まり、ワイの木ガチャを引けるようになった。","【タエコ】 木もらえるん！友達誘って行かな"]},
  {num:10,title:"グラングリーンにて",img:"slide10.png",lines:["【ナレーター】 場所はグラングリーン。彼女はついに、自分だけのワイの木を手にした。","【タエコ】 成長日記つけなあかんなぁ"]},
  {num:11,title:"BeReal",img:"slide11.png",lines:["【SE】 BeReal通知音","【タエコ】 BeRealきた！"]},
  {num:12,title:"広がる輪",img:"slide12.png",lines:["【ナレーター】 同じ頃、彼女の友人たちもまた、それぞれのSNSに投稿をし始めている。環境活動は、もはや誰かのものではなく、自分自身の物語になりつつあった。"]},
  {num:13,title:"マイル爆増",img:"slide13.png",lines:["【タエコ】 まってマイル、バリ貯まってんねんけど"]},
  {num:14,title:"届かない特典",img:"slide14.png",lines:["【ナレーター】 追加で使用可能なギガが日々の環境貢献活動により貯まっていく。しかし、ソフトバンク系列のユーザーのみが利用できるので、DOKONOユーザーのタエコちゃんは使えません。","【タエコ】 萎えるわ～"]},
  {num:15,title:"決意",img:"slide15.png",lines:["【タエコ】 卒業したら乗り換えるって決めててん"]},
  {num:16,title:"年度末レポート",img:"slide16.png",lines:["【ナレーター】 年度末——アプリで一年間の頑張りを見ることができる。","【タエコ】 頑張ったし友達に勝ったかな"]},
  {num:17,title:"新社会人",img:"slide17.png",lines:["【タエコ】 新社会人しんどっ。癒しが欲しいわ"]},
  {num:18,title:"癒し",img:"slide18.png",lines:["【タエコ】 ワイの木しか勝たんわ～"]},
  {num:19,title:"運命の通知",img:"slide19.png",lines:["【ナレーター】 そして迎えた8月のある日。タエコのもとに自治体からワイの木を推し森に植える準備ができたと通知が来ました。"]},
  {num:20,title:"歓喜",img:"slide20.png",lines:["【タエコ】 推し森行けるなんてガチ幸せ"]},
  {num:21,title:"仲間との再会",img:"slide21.png",lines:["【タエコ】 川上村仲間のみんな、会いたかったで"]},
  {num:22,title:"植樹の瞬間",img:"slide22.png",lines:["【ナレーター】 いよいよ、ワイの木を推し森に植えるときが来ました","【タエコ】 （しみじみと）一年間ありがとう。大きくなってな"]},
  {num:23,title:"新たな相棒",img:"slide23.png",lines:["【ナレーター】 ワイの木とは離れ離れになってしまいましたが、またマイルをため、新たなワイの木を手に入れました。","【タエコ】 新たな相棒、よろしく"]},
  {num:24,title:"エピローグ",img:"slide24.png",lines:["【ナレーター】 楽しく、お得で、しかも手応えがある——そんな環境貢献活動は、いつしか彼女の暮らしに溶け込んでいた。月日は流れ、かつての小さな苗木は、立派にCO₂を吸収する一本の樹へと育っていく。","【ト書き】 （間）","【ナレーター】 そう、すべては——あの日、PayPayの画面が緑に染まったことから始まったのだった……。","— 完 —"]}
];

let mode='one', cur=0;
const isWide=()=>window.innerWidth>=1200;

function cls(l){
  if(l.startsWith('【ナレーター】'))return'narrator';
  if(l.startsWith('【ト書き】'))return'stage';
  if(l.startsWith('【SE】'))return'se';
  if(l==='— 完 —')return'end';
  return'character';
}

function scriptHTML(s){
  const lines=s.lines.map(l=>`<div class="line ${cls(l)}">${l}</div>`).join('');
  return `<div class="scene-label"><span class="badge">#${s.num}</span><span class="scene-title">${s.title}</span></div>
          <div class="slbl">🎙 スクリプト</div>${lines}`;
}

function imgHTML(s, forCol=false){
  if(s.img) return `<img src="${s.img}" alt="スライド${s.num}" id="mainImg">`;
  return `<div class="no-img-box">🌱 #${s.num} 表紙（画像なし）</div>`;
}

function renderOne(i){
  const s=S[i];
  document.getElementById('ctr').textContent=`${i+1} / ${S.length}`;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===S.length-1;
  document.getElementById('pf').style.width=((i+1)/S.length*100)+'%';

  if(isWide()){
    // Desktop: side-by-side
    document.getElementById('imgArea').style.display='none';
    document.getElementById('scriptArea').style.display='none';
    document.getElementById('imgCol').style.display='flex';
    document.getElementById('scriptCol').style.display='block';
    document.getElementById('imgCol').innerHTML=imgHTML(s,true);
    document.getElementById('scriptCol').innerHTML=scriptHTML(s);
  } else {
    // Mobile/tablet: stacked
    document.getElementById('imgArea').style.display='flex';
    document.getElementById('scriptArea').style.display='block';
    document.getElementById('imgCol').style.display='none';
    document.getElementById('scriptCol').style.display='none';
    document.getElementById('imgArea').innerHTML=imgHTML(s);
    document.getElementById('scriptArea').innerHTML=scriptHTML(s);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderAll(){
  const html=S.map(s=>{
    const img=s.img?`<div class="img-area"><img src="${s.img}" alt="${s.num}" loading="lazy"></div>`
                   :`<div class="img-area"><div class="no-img-box">🌱 #${s.num} 表紙（画像なし）</div></div>`;
    const lines=s.lines.map(l=>`<div class="line ${cls(l)}">${l}</div>`).join('');
    return`<div class="all-card">
      <div class="ch"><span class="badge">#${s.num}</span><span class="scene-title">${s.title}</span></div>
      ${img}
      <div class="script-area"><div class="slbl">🎙 スクリプト</div>${lines}</div>
    </div>`;
  }).join('');
  document.getElementById('allView').innerHTML=html;
  document.getElementById('ctr').textContent=`全${S.length}シーン`;
}

function showOne(){
  document.getElementById('oneView').style.display='flex';
  document.getElementById('allView').style.display='none';
  document.getElementById('nav').style.display='flex';
  document.getElementById('tbtn').textContent='📋 一覧';
  renderOne(cur);
}

function showAll(){
  document.getElementById('oneView').style.display='none';
  document.getElementById('allView').style.display='block';
  document.getElementById('nav').style.display='none';
  document.getElementById('tbtn').textContent='🔍 1枚ずつ';
  renderAll();
}

function toggleMode(){
  if(mode==='one'){mode='all';showAll();}
  else{mode='one';showOne();}
}

function move(d){
  cur=Math.max(0,Math.min(S.length-1,cur+d));
  renderOne(cur);
}

// Keyboard navigation
document.addEventListener('keydown',e=>{
  if(mode!=='one')return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') move(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') move(-1);
});

// Handle resize
window.addEventListener('resize',()=>{if(mode==='one')renderOne(cur);});

// Start in one-slide mode
showOne();
</script>
</body>
</html>
